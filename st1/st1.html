<!DOCTYPE html>
<head>
<title>Employee details</title>
</head>
<body>

<script>
let employees = [
    {
        name: "Priyanshu",
        age: 19,
        salary: 49000
    },
    {
        name: "Parth",
        age: 19,
        salary: 70000
    },
    {
        name: "Sanket",
        age: 20,
        salary: 90000
    }
];

for (let emp of employees) {
    if (emp.salary >= 50000) {
        document.write(emp.name);
        document.write(emp.age);
    }
}
</script>

</body>
